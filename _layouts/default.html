<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg-card: #161b22;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --border: #30363d;
      --code-bg: #1c2128;
      --green: #3fb950;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      font-size: 16px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 2rem;
    }
    /* Header */
    .site-header {
      border-bottom: 1px solid var(--border);
      padding: 1rem 0;
      margin-bottom: 2rem;
    }
    .site-header h1 { font-size: 1.3rem; font-weight: 600; }
    .site-header h1 a { color: var(--text); text-decoration: none; }
    .site-header nav { margin-top: 0.5rem; }
    .site-header nav a {
      color: var(--accent);
      text-decoration: none;
      margin-right: 1.5rem;
      font-size: 0.9rem;
    }
    .site-header nav a:hover { text-decoration: underline; }
    /* Content */
    h1 { font-size: 1.8rem; margin: 1.5rem 0 0.8rem; color: #f0f6fc; }
    h2 { font-size: 1.4rem; margin: 1.5rem 0 0.6rem; color: #f0f6fc; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
    h3 { font-size: 1.15rem; margin: 1.2rem 0 0.5rem; color: #f0f6fc; }
    h4 { font-size: 1rem; margin: 1rem 0 0.4rem; color: var(--text); }
    p { margin: 0.5rem 0; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    strong { color: #f0f6fc; }
    ul, ol { margin: 0.5rem 0 0.5rem 1.5rem; }
    li { margin: 0.2rem 0; }
    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 0.88rem;
    }
    th, td {
      border: 1px solid var(--border);
      padding: 0.5rem 0.7rem;
      text-align: left;
    }
    th { background: var(--bg-card); color: #f0f6fc; font-weight: 600; }
    tr:nth-child(even) { background: rgba(22,27,34,0.5); }
    /* Code */
    code {
      background: var(--code-bg);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-size: 0.88rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
      overflow-x: auto;
      margin: 0.8rem 0;
      font-size: 0.82rem;
      line-height: 1.5;
    }
    pre code { background: none; padding: 0; }
    /* Images */
    img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      margin: 1rem 0;
    }
    /* Blockquotes */
    blockquote {
      border-left: 3px solid var(--accent);
      padding: 0.5rem 1rem;
      margin: 0.8rem 0;
      color: var(--text-muted);
      background: var(--bg-card);
      border-radius: 0 6px 6px 0;
    }
    blockquote p { margin: 0.2rem 0; }
    /* HR */
    hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
    /* TOC sidebar */
    .page-with-toc {
      display: grid;
      grid-template-columns: 1fr 200px;
      gap: 2rem;
    }
    .toc {
      position: sticky;
      top: 1rem;
      align-self: start;
      font-size: 0.8rem;
      border-left: 1px solid var(--border);
      padding-left: 1rem;
      max-height: 90vh;
      overflow-y: auto;
    }
    .toc ul { list-style: none; margin: 0; padding: 0; }
    .toc li { margin: 0.3rem 0; }
    .toc a { color: var(--text-muted); }
    .toc a:hover { color: var(--accent); }
    .toc .toc-h3 { padding-left: 0.8rem; }
    @media (max-width: 768px) {
      .page-with-toc { grid-template-columns: 1fr; }
      .toc { display: none; }
    }
    /* Footer */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 1rem 0;
      margin-top: 3rem;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="site-header">
      <h1><a href="{{ site.baseurl }}/">{{ site.title }}</a></h1>
      <nav>
        <a href="{{ site.baseurl }}/">Главная</a>
        <a href="{{ site.baseurl }}/02-memory-architecture">Honcho</a>
        <a href="{{ site.baseurl }}/03-mem0-feasibility">Mem0</a>
        <a href="{{ site.baseurl }}/04-implementation-comparison">Сравнение</a>
      </nav>
    </header>
    <main class="page-with-toc">
      <article>
        {{ content }}
      </article>
      <aside class="toc" id="toc"></aside>
    </main>
    <footer class="site-footer">
      AI Memory Research &mdash; {{ site.description }}
    </footer>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script>mermaid.initialize({startOnLoad:true, theme:'dark'});</script>
  <script>
    // Auto-generate TOC from h2/h3
    (function() {
      var toc = document.getElementById('toc');
      if (!toc) return;
      var headings = document.querySelectorAll('article h2, article h3');
      if (headings.length < 3) { toc.style.display = 'none'; return; }
      var ul = document.createElement('ul');
      headings.forEach(function(h) {
        if (!h.id) h.id = h.textContent.trim().toLowerCase().replace(/[^\wа-яё]+/gi, '-');
        var li = document.createElement('li');
        if (h.tagName === 'H3') li.className = 'toc-h3';
        var a = document.createElement('a');
        a.href = '#' + h.id;
        a.textContent = h.textContent;
        li.appendChild(a);
        ul.appendChild(li);
      });
      toc.appendChild(ul);
    })();
  </script>
</body>
</html>
